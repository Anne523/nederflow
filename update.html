<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NederFlow Update</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17212b;
        background: #f6f8fb;
      }
      main {
        width: min(520px, 100%);
        padding: 24px;
        border: 1px solid #dce3ea;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 16px 42px rgba(24, 36, 48, 0.1);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        color: #65717f;
        line-height: 1.5;
      }
      a, button {
        min-height: 36px;
        padding: 8px 12px;
        border: 1px solid #0f766e;
        border-radius: 6px;
        background: #0f766e;
        color: white;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }
      code {
        color: #115e59;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Updating NederFlow</h1>
      <p id="status">Clearing old app cache...</p>
      <p>Target version: <code>v0.6.3</code></p>
      <div class="actions">
        <button id="retry" type="button">Clear cache again</button>
        <a href="./index.html?v=0.6.3">Open NederFlow</a>
      </div>
    </main>
    <script>
      async function clearNederFlowCache() {
        const status = document.getElementById("status");
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ("caches" in window) {
            const names = await caches.keys();
            await Promise.all(names.filter((name) => name.includes("nederflow")).map((name) => caches.delete(name)));
          }
          status.textContent = "Old cache cleared. Opening the latest version...";
          setTimeout(() => {
            window.location.replace("./index.html?v=0.6.3");
          }, 900);
        } catch (error) {
          status.textContent = "Could not fully clear cache. Use the Open NederFlow button below.";
        }
      }
      document.getElementById("retry").addEventListener("click", clearNederFlowCache);
      clearNederFlowCache();
    </script>
  </body>
</html>
